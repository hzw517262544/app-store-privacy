<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>数独下载中转</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; padding: 24px; line-height: 1.6; }
      .card { max-width: 560px; margin: 32px auto; border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; }
      .btn { display: inline-block; margin-top: 12px; padding: 10px 14px; border-radius: 10px; background: #0a84ff; color: #fff; text-decoration: none; }
      .muted { color: #6b7280; font-size: 14px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>正在跳转下载...</h2>
      <p id="status" class="muted">请稍候。</p>
      <a id="manual" class="btn" href="#" style="display:none">手动打开下载页</a>
    </div>

    <script>
      (function () {
        const iosUrl = 'https://apps.apple.com/cn/app/id6762558725';
        const androidUrl = 'https://gitee.com/hzw517262544/com.sm.apks/releases/download/sudoku-android-release.apk/sudoku-android-release.apk';

        const params = new URLSearchParams(window.location.search);
        const code = (params.get('code') || '').trim();
        const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
        const targetBase = isIOS ? iosUrl : androidUrl;
        const target = code ? `${targetBase}${targetBase.includes('?') ? '&' : '?'}code=${encodeURIComponent(code)}` : targetBase;

        const status = document.getElementById('status');
        const manual = document.getElementById('manual');
        status.textContent = isIOS ? '检测到 iOS 设备，正在前往 App Store...' : '检测到 Android 设备，正在前往安装包下载地址...';
        manual.href = target;
        manual.style.display = 'inline-block';

        window.location.replace(target);
      })();
    </script>
  </body>
</html>
